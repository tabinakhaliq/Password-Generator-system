<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <div class="card main-card">
            <h1>Password Generator</h1>
            <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
            <p class="subtext">Generate secure passwords with smart options</p>

            <label for="length">Password Length</label>
            <input type="number" id="length" min="8" max="32" placeholder="Enter length (8-32)">

            <div class="options">
                <label><input type="checkbox" id="uppercase"> Uppercase Letters</label>
                <label><input type="checkbox" id="lowercase"> Lowercase Letters</label>
                <label><input type="checkbox" id="numbers"> Numbers</label>
                <label><input type="checkbox" id="symbols"> Symbols</label>
            </div>

            <button onclick="generatePassword()">Generate Password</button>

            <label for="generatedPassword">Generated Password</label>
            <div class="result-box">
                <input type="password" id="generatedPassword" readonly placeholder="Your password will appear here">
                <button class="small-btn" onclick="togglePassword()">Show</button>
            </div>

            <div class="strength-box">
                <span>Password Strength:</span>
                <span id="strengthText">-</span>
            </div>

            <div class="action-buttons">
                <button onclick="copyPassword()">Copy</button>
                <button class="save-btn" onclick="savePassword()">Save</button>
            </div>
        </div>

        <div class="card side-card">
            <h2>Saved History</h2>

            <input type="text" id="search" placeholder="Search passwords..." onkeyup="searchHistory()">

            <ul id="history" class="history-list"></ul>

            <button class="danger-btn" onclick="clearHistory()">Clear All History</button>
            <button onclick="exportHistory()">Export History</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
